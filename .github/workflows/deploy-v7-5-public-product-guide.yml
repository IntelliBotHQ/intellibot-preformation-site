name: Deploy V7.5 Public Product Guide

on:
  push:
    paths:
      - '.github/workflows/deploy-v7-5-public-product-guide.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-public-guide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply V7.5 public product guide update
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re, textwrap

          root = Path('.')
          docs = root / 'documents'
          docs.mkdir(exist_ok=True)
          pdf_name = 'IntelliBot_Public_Product_Information_Guide_Phase0_Alpha.pdf'

          def esc_pdf(s):
              return s.replace('\\','\\\\').replace('(','\\(').replace(')','\\)').replace('\r','').replace('\t','    ')

          def wrap(s, width=92):
              out=[]
              for part in s.split('\n'):
                  if not part.strip():
                      out.append('')
                  else:
                      out.extend(textwrap.wrap(part, width=width, break_long_words=False))
              return out

          sections = [
          ('IntelliBot - Public Product Information Guide', 'Risk-first retail crypto trading automation for Coinbase Spot\nPhase 0 Alpha Public Reference Edition\n\nPublic-consumption note: This guide is designed for prospective customers, early testers, design partners, and interested stakeholders. It is informational only. It is not investment advice, not a performance claim, and not an offer to sell securities.\n\nPrepared for public consumption | Current as of June 2026'),
          ('1. Executive Overview', 'IntelliBot is being built as a risk-first, proof-first automated crypto trading cockpit for retail users who want disciplined Coinbase Spot automation without leverage, short selling, custody, or black-box AI execution.\n\nAutomation should not mean overactivity. IntelliBot is designed to teach, validate, explain, and protect before it executes. The operating sequence is education first, configuration second, proof third, sandbox fourth, and live arming last.\n\nCurrent public status: Alpha Phase 0 is in progress. Phase 0 is focused on product governance, user workflow design, proof contracts, risk boundaries, documentation, and implementation readiness. This guide does not claim that live trading functionality is commercially available.'),
          ('2. What IntelliBot Is', 'Initial public scope: Coinbase Advanced Trade API, Coinbase Spot only, long-only active trading, one active trade maximum, non-custodial API-key usage, view and trade permissions only, no withdrawal permissions, internal IntelliBot event-driven backtester as canonical, and AI/news advisory context only.\n\nThis narrower starting scope is a trust strategy. It reduces execution ambiguity, makes the audit trail easier to reconstruct, keeps risk visible, and allows every trade decision to be explained or vetoed.'),
          ('3. Product Boundaries and Public Messaging Rules', 'Use: risk-first automation; strategy validation and sandbox-first workflow; non-custodial, no withdrawal permissions; AI/news as advisory context; Coinbase Spot, long-only, one active trade; public informational guide.\n\nAvoid: guaranteed profit, passive income, beat-the-market claims, claims that backtests prove future results, custodian/broker/adviser/fund-management language, AI or news as autonomous trading authority, margin/leverage/futures/derivatives/short selling/multi-position concurrency, and public securities offering or investor solicitation.'),
          ('4. Who IntelliBot Is For', 'Beginner: education, safety, low configuration burden, and confidence before live trading.\nIntermediate retail trader: configurable strategies, proof gates, backtesting, and clear trade reasons.\nAdvanced retail trader: deeper control, measurable edge, auditability, custom parameters, and market context.\nDesign partner or interested stakeholder: evidence of product discipline, defensible differentiation, and roadmap clarity.'),
          ('5. Public Roadmap and Current Phase', 'Phase 0 - Alpha governance and readiness: in progress; current active phase.\nPhase 1 - Local foundation: not yet active.\nPhase 2 - Risk and market-data foundation: future phase.\nPhase 3 - Strategy proof and backtesting: future phase.\nPhase 4 - Live-trading cockpit: future phase.\nPhase 5 - Reporting and beta readiness: future phase.\nPhase 6 - Release candidate hardening: future phase.\nPhase 7 - Commercialization and compliance perimeter: future phase; not active during Phase 0.\n\nThe public roadmap is not a release promise and does not authorize features before their phase gate is approved.'),
          ('6. User Interface and Workflow', 'The authoritative UI model uses seven dedicated left-navigation surfaces: Dashboard, Live Trading, Strategies, Backtesting, Risk Center, Reporting, and Settings. Standalone Screener, Charts, and AI/Sentiment pages have been retired as separate navigation surfaces and embedded where users need them.\n\nFirst-run UX: Settings is the only enabled workspace until required setup gates are satisfied. Other navigation surfaces unlock progressively with visible lock reasons and readiness status.'),
          ('7. Risk Profiles and Guardrails', 'Observer: 0% live risk, sandbox-forced.\nConservative: 1.0% default equity risk per trade, stricter gates, tighter drawdown posture, longer cooldowns.\nBalanced: 1.5% default equity risk per trade, standard middle risk posture.\nAggressive: 2.0% hard cap, greater opportunity tolerance but still bounded by profile caps and RiskManager veto.\n\nProfile changes do not retroactively alter an open trade.'),
          ('8. Strategy Families and Trade Lifecycle', 'Strategies emit signals. Signals do not place orders. RiskManager, AccountSafetyWatchdog, proof gates, session rules, market-universe filters, and audit checks must approve before execution can occur.\n\nCore proof-eligible families include ORB variants, scalp variants, and swing setups. Roadmap families include VWAP pullback/reclaim, trend continuation, breakout momentum, range support bounce, volume expansion, and market structure classification.'),
          ('9. Backtesting, Proof Gates, and Market Universe', 'Backtesting is the proof layer. IntelliBot strategies must be testable, reproducible, and blocked from sandbox/live trust until they satisfy objective validation gates.\n\nMinimum examples: 1m requires 300 completed closed trades over 3 months; synthetic 3m requires 200 over 6 months; 5m requires 150 over 6 months; 15m requires 100 over 12 months. Net expectancy must be positive after fees, spread, slippage, modeled execution costs, and partial-fill assumptions.'),
          ('10. News, AI, and Advisory Context', 'News, event-risk intelligence, sentiment, and AI summaries are context layers, not execution authority. Positive news may explain context but cannot create a buy, increase risk above profile caps, or bypass RiskManager or AccountSafetyWatchdog. AI helps explain market context and system posture; it does not replace risk governance.'),
          ('11. Security, Privacy, and Audit Integrity', 'The public security story is local-first, non-custodial, no withdrawal permissions, master-password-protected credential storage, no password recovery backdoor, and audit-linked decision evidence. The master password derives a local encryption key and is not stored. Forgotten password requires destructive local credential wipe and readiness reset. Audit evidence is planned as tamper-evident, not tamper-proof.'),
          ('12. Public Reference Notes', 'This guide is intentionally public-facing. It excludes internal development-control instructions, private project-control details, and implementation steps that are not relevant to public readers. Public materials should continue to avoid performance guarantees, investment-advice language, securities-offering language, and claims that backtests guarantee future results.'),
          ('13. Public-Safe Summary Statement', 'IntelliBot is being designed as a local-first, risk-first crypto trading cockpit that helps retail users understand, test, and supervise Coinbase Spot automation before live capital is exposed. It is not a promise of profit, not investment advice, not a custodian, and not a public financing offer. Its product value is discipline: one active trade, proof before trust, sandbox before live capital, advisory AI that cannot override safety, and a user experience that explains both action and restraint.')]

          lines=[]
          for title, body in sections:
              lines.append(('H', title))
              for line in wrap(body):
                  lines.append(('B', line))
              lines.append(('B',''))

          pages=[]; cur=[]; count=0
          for kind,line in lines:
              h=2 if kind=='H' else 1
              if count + h > 44:
                  pages.append(cur); cur=[]; count=0
              cur.append((kind,line)); count += h
          if cur: pages.append(cur)

          objs=[]
          def add(obj):
              objs.append(obj); return len(objs)
          font=add('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>')
          fontb=add('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>')
          page_ids=[]
          for i,page in enumerate(pages,1):
              y=744; ops=['BT']
              ops.append(f'/F2 8 Tf 430 770 Td (IntelliBot - Public Product Information Guide) Tj')
              ops.append(f'/F1 8 Tf 250 24 Td (IntelliBot Public Product Information Guide | Page {i}) Tj')
              for kind,line in page:
                  if kind=='H':
                      y-=22; ops.append(f'/F2 15 Tf 54 {y} Td ({esc_pdf(line)}) Tj')
                      y-=10
                  elif line=='':
                      y-=8
                  else:
                      y-=13; ops.append(f'/F1 9 Tf 54 {y} Td ({esc_pdf(line)}) Tj')
              ops.append('ET')
              stream='\n'.join(ops)
              content_id=add(f'<< /Length {len(stream.encode("ascii"))} >>\nstream\n{stream}\nendstream')
              page_id=add(f'<< /Type /Page /Parent 0 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 {font} 0 R /F2 {fontb} 0 R >> >> /Contents {content_id} 0 R >>')
              page_ids.append(page_id)
          pages_id=add('<< /Type /Pages /Kids ['+' '.join(f'{p} 0 R' for p in page_ids)+f'] /Count {len(page_ids)} >>')
          catalog_id=add(f'<< /Type /Catalog /Pages {pages_id} 0 R >>')
          # Patch page parent references now that pages_id is known
          for pid in page_ids:
              objs[pid-1]=objs[pid-1].replace('/Parent 0 0 R', f'/Parent {pages_id} 0 R')
          out=['%PDF-1.4','% ASCII public guide']
          offsets=[]
          for n,obj in enumerate(objs,1):
              offsets.append(sum(len(x.encode('ascii'))+1 for x in out))
              out.append(f'{n} 0 obj\n{obj}\nendobj')
          xref=sum(len(x.encode('ascii'))+1 for x in out)
          trailer=['xref',f'0 {len(objs)+1}','0000000000 65535 f ']
          trailer += [f'{off:010d} 00000 n ' for off in offsets]
          trailer += ['trailer',f'<< /Size {len(objs)+1} /Root {catalog_id} 0 R >>','startxref',str(xref),'%%EOF']
          pdf='\n'.join(out+trailer)+'\n'
          (docs/pdf_name).write_text(pdf, encoding='ascii')

          documents_html = '''<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Public Product Guide | IntelliBot</title><meta name="description" content="Download the IntelliBot Public Product Information Guide, Phase 0 Alpha Public Reference Edition."><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="../assets/style.css"></head>
<body><header class="site-header"><nav class="wrap nav-shell" aria-label="Primary navigation"><a class="brand" href="../" aria-label="IntelliBot home"><img src="../assets/intellibot-emblem.png" alt=""><span>Intelli<strong>Bot</strong></span></a><button class="mobile-toggle" type="button" aria-expanded="false" aria-controls="site-navigation" data-nav-toggle><span class="sr-only">Open navigation menu</span><span class="hamburger" aria-hidden="true"><span></span><span></span><span></span></span></button><div class="links" id="site-navigation" data-mobile-nav><a href="../product/">Product</a><a href="../documents/">Guide</a><a href="../interface/">Interface</a><a href="../roadmap/">Roadmap</a><a href="../trust/">Trust &amp; Safety</a><a href="../disclosures/">Disclosures</a><a href="../privacy/">Privacy</a><a href="../contact/">Contact</a></div></nav></header><main>
<section class="page-head pro-head"><div class="wrap"><span class="chip">Public reference · Phase 0 Alpha · PDF download</span><h1>Public Product Information Guide</h1><p class="lead">A public-facing reference for prospective customers, early testers, design partners, angels, and interested stakeholders who want a more complete explanation of IntelliBot's product scope, risk-first operating model, roadmap, workflow, proof gates, and public-facing boundaries.</p><div class="actions"><a class="btn primary" href="IntelliBot_Public_Product_Information_Guide_Phase0_Alpha.pdf" target="_blank" rel="noopener">Open PDF guide</a><a class="btn" href="IntelliBot_Public_Product_Information_Guide_Phase0_Alpha.pdf" download>Download PDF</a></div></div></section>
<section><div class="wrap"><div class="notice"><strong>Public-consumption note:</strong> This guide is informational only. It is not investment advice, not a performance claim, not a released-product representation, not a beta invitation, and not an offer to sell securities.</div></div></section>
<section><div class="wrap"><div class="section-heading"><div class="kicker">What the guide covers</div><h2>Product detail without expanding the public claim boundary.</h2><p>The guide gives a deeper explanation than the landing pages while preserving the same risk-first, pre-formation, no-performance-claim posture.</p></div><div class="grid three"><article class="card"><div class="tag">Scope</div><h3>What IntelliBot is</h3><p>Coinbase Spot, long-only active trading, one active trade maximum, non-custodial API use, and no withdrawal permissions.</p></article><article class="card"><div class="tag">Users</div><h3>Who it is for</h3><p>Beginner, intermediate, and advanced retail users, plus design partners and interested stakeholders evaluating product discipline.</p></article><article class="card"><div class="tag">Roadmap</div><h3>Phase 0 through Phase 7</h3><p>Customer-readable roadmap bands covering alpha governance, local foundation, proof gates, live-trading cockpit, reporting, release hardening, and commercialization review.</p></article><article class="card"><div class="tag">Workflow</div><h3>UI and operator flow</h3><p>Dashboard, Live Trading, Strategies, Backtesting, Risk Center, Reporting, and Settings.</p></article><article class="card"><div class="tag">Proof</div><h3>Backtesting and guardrails</h3><p>Risk profiles, proof gates, market universe controls, canonical backtesting, and objective validation requirements before trust.</p></article><article class="card"><div class="tag">Trust</div><h3>AI, security, and audit integrity</h3><p>AI/news/sentiment advisory limits, local credential posture, API permission limits, and audit-linked decision evidence.</p></article></div></div></section>
<section><div class="wrap split-panel"><div><div class="kicker">Recommended use</div><h2>Use the guide as the deeper public reference.</h2><p>The website pages remain concise. The PDF gives readers who want more detail a structured document they can download, review, and share without turning the site into a long technical manual.</p></div><div class="panel elevated"><h3>Boundary retained</h3><ul class="clean"><li>No beta enrollment is active through this guide.</li><li>No investment terms or fundraising workflow are published here.</li><li>No product download or account connection is offered.</li><li>No performance result or expected return is claimed.</li></ul></div></div></section>
</main><footer><div class="wrap footer-grid"><div><strong>IntelliBot</strong><p>IntelliBot is a pre-formation product initiative in development. It is not presently represented as an incorporated entity. Crypto trading involves substantial risk and can result in loss.</p><p>© 2026 IntelliBot project initiative. All rights reserved.</p></div><div class="footer-links"><a href="../documents/">Product Guide</a><a href="../terms/">Terms</a><a href="../privacy/">Privacy</a><a href="../disclosures/">Disclosures</a><a href="../trust/">Security</a><a href="mailto:info@intellibot.us">info@intellibot.us</a></div></div></footer><script src="../assets/navigation.js" defer></script></body></html>'''
          (docs/'index.html').write_text(documents_html, encoding='utf-8')

          def prefix_for(path): return '' if '/' not in path.as_posix() else '../'
          def update_nav_footer(path):
              text=path.read_text(encoding='utf-8', errors='ignore'); prefix=prefix_for(path.relative_to(root))
              product=f'<a href="{prefix}product/">Product</a>'; guide=f'<a href="{prefix}documents/">Guide</a>'
              if product in text and guide not in text: text=text.replace(product, product+'\n      '+guide, 1)
              footer=f'<a href="{prefix}documents/">Product Guide</a>'
              if '<div class="footer-links">' in text and footer not in text: text=text.replace('<div class="footer-links">','<div class="footer-links">'+footer,1)
              path.write_text(text, encoding='utf-8')
          for path in root.rglob('*.html'):
              if path.as_posix().startswith('documents/'): continue
              update_nav_footer(path)

          idx=root/'index.html'; text=idx.read_text(encoding='utf-8')
          if 'Download the <span>Public Product Information Guide</span>' not in text:
              block='''\n<section><div class="wrap split-panel"><div><div class="kicker">Public reference</div><h2>Download the <span>Public Product Information Guide</span>.</h2><p>The guide provides a deeper Phase 0 Alpha explanation of IntelliBot's scope, operating model, roadmap, workflow, proof gates, security posture, and public-facing boundaries for customers, early testers, design partners, and interested stakeholders.</p><div class="actions"><a class="btn primary" href="documents/">View product guide</a><a class="btn" href="documents/IntelliBot_Public_Product_Information_Guide_Phase0_Alpha.pdf" target="_blank" rel="noopener">Open PDF</a></div></div><div class="panel elevated"><h3>Publication boundary</h3><p>The guide is informational only. It is not investment advice, not a performance claim, not a beta invitation, and not a securities offering.</p></div></div></section>\n'''
              idx.write_text(text.replace('</main>', block+'</main>',1), encoding='utf-8')

          prod=root/'product/index.html'; text=prod.read_text(encoding='utf-8')
          if 'Download the Phase 0 Alpha guide' not in text:
              block='''\n<section><div class="wrap split-panel"><div><div class="kicker">Public product guide</div><h2>Download the Phase 0 Alpha guide.</h2><p>For a more complete public explanation of IntelliBot's product scope, risk profiles, strategy proof model, roadmap, UI workflow, and security boundaries, read the Public Product Information Guide.</p><div class="actions"><a class="btn primary" href="../documents/">View product guide</a><a class="btn" href="../documents/IntelliBot_Public_Product_Information_Guide_Phase0_Alpha.pdf" target="_blank" rel="noopener">Open PDF</a></div></div><div class="panel elevated"><h3>Public-safe reference</h3><p>The PDF is designed for public consumption and avoids guaranteed-profit language, live-trading claims, securities-offering language, and public financing solicitation.</p></div></div></section>\n'''
              prod.write_text(text.replace('</main>', block+'</main>',1), encoding='utf-8')

          sm=root/'sitemap.xml'
          if sm.exists():
              s=sm.read_text(encoding='utf-8')
              add='''  <url>\n    <loc>https://intellibot.us/documents/</loc>\n  </url>\n  <url>\n    <loc>https://intellibot.us/documents/IntelliBot_Public_Product_Information_Guide_Phase0_Alpha.pdf</loc>\n  </url>\n'''
              if 'https://intellibot.us/documents/' not in s: sm.write_text(s.replace('</urlset>',add+'</urlset>'), encoding='utf-8')
          (root/'WEBSITE_V7_5_PUBLIC_PRODUCT_GUIDE_RELEASE_NOTES.md').write_text('# IntelliBot Website V7.5 - Public Product Information Guide Release Notes\n\nV7.5 adds the public `/documents/` page and hosts the IntelliBot Public Product Information Guide PDF for public consumption. The guide is informational only and does not activate beta enrollment, investor solicitation, analytics, product download, live trading access, credential collection, financing terms, or performance claims.\n', encoding='utf-8')
          r=root/'README.md'; rt=r.read_text(encoding='utf-8')
          if '## V7.5 public product information guide release' not in rt: r.write_text(rt.rstrip()+'\n\n## V7.5 public product information guide release\n\nWebsite V7.5 supersedes V7.4.1 for public website deployment. V7.5 adds a dedicated `/documents/` page and hosts the PDF version of the IntelliBot Public Product Information Guide, Phase 0 Alpha Public Reference Edition, for public consumption.\n', encoding='utf-8')
          m=root/'PUBLICATION_SAFETY_MANIFEST.md'; mt=m.read_text(encoding='utf-8')
          if '## V7.5 public product information guide publication-safety note' not in mt: m.write_text(mt.rstrip()+'\n\n## V7.5 public product information guide publication-safety note\n\nV7.5 adds a public `/documents/` page and hosts the PDF version of the IntelliBot Public Product Information Guide, Phase 0 Alpha Public Reference Edition. The guide is informational only and is not investment advice, a performance claim, beta enrollment, product download, securities offering, or public financing solicitation.\n', encoding='utf-8')

          # Remove this one-time workflow from the final commit.
          wf=root/'.github/workflows/deploy-v7-5-public-product-guide.yml'
          if wf.exists(): wf.unlink()

          # Validation
          assert (docs/'index.html').exists()
          assert (docs/pdf_name).exists() and (docs/pdf_name).stat().st_size > 10000
          for page in ['index.html','product/index.html','interface/index.html','roadmap/index.html','trust/index.html','disclosures/index.html','privacy/index.html','terms/index.html','contact/index.html']:
              if 'documents/' not in Path(page).read_text(encoding='utf-8', errors='ignore'):
                  raise SystemExit(f'Missing documents link in {page}')
          print('V7.5 public product guide update validated.')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy Website V7.5 public product guide"
          git push
